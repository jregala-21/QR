<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Vault</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
}

.header {
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 12px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 10px;
    text-align: center;
    animation: fadeIn 0.3s;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.label { margin-top: 6px; font-weight: bold; }
.bank { font-size: 12px; opacity: 0.7; }

.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.sheet {
    position: fixed;
    bottom: -100%;
    width: 100%;
    background: #1e293b;
    padding: 20px;
    border-radius: 20px 20px 0 0;
    transition: .3s;
}

.sheet.active { bottom: 0; }

select, input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
}

.upload-btn {
    background: #22c55e;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    border-radius: 10px;
}

.modal-btn {
    margin-top: 10px;
    background: #22c55e;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(.9);}
    to {opacity:1; transform:scale(1);}
}
</style>
</head>
<body>

<div class="header">📱 QR Vault</div>
<div class="grid" id="grid"></div>

<div class="fab" onclick="openSheet()">+</div>

<div class="sheet" id="sheet">
    <select id="bank">
        <option value="">Select Bank</option>
        <option value="gcash">GCash</option>
        <option value="maya">Maya</option>
        <option value="bpi">BPI</option>
        <option value="unionbank">UnionBank</option>
        <option value="maribank">Maribank</option>
        <option value="tonik">Tonik</option>
        <option value="gotyme">GoTyme</option>
        <option value="bdo">BDO</option>
    </select>
    <input type="file" id="file" accept="image/*">
    <div class="upload-btn" onclick="upload()">Save QR</div>
</div>

<div class="modal" id="modal" onclick="this.style.display='none'">
    <div>
        <img id="img">
        <div class="modal-btn" id="openBtn">Open App</div>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("qr")) || [];

function save(){ localStorage.setItem("qr", JSON.stringify(data)); }

function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    data.forEach(q=>{
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${q.image}">
            <div class="label">${q.bank.toUpperCase()}</div>
        `;
        div.onclick = ()=>openModal(q);
        grid.appendChild(div);
    });
}

function openSheet(){
    document.getElementById("sheet").classList.add("active");
}

function upload(){
    const file = document.getElementById("file").files[0];
    const bank = document.getElementById("bank").value;

    if(!file || !bank){ alert("Complete fields"); return; }

    const reader = new FileReader();
    reader.onload = e=>{
        data.push({bank, image:e.target.result});
        save(); render();
        document.getElementById("sheet").classList.remove("active");
    };
    reader.readAsDataURL(file);
}

function openModal(q){
    document.getElementById("modal").style.display="flex";
    document.getElementById("img").src=q.image;
    document.getElementById("openBtn").onclick=()=>openApp(q.bank);
}

function openApp(bank){
    const links={
        gcash:"gcash://",
        maya:"maya://",
        bpi:"bpi://",
        unionbank:"unionbank://",
        maribank:"maribank://",
        tonik:"tonik://",
        gotyme:"gotyme://",
        bdo:"bdo://"
    };
    location.href=links[bank]||"";
}

render();

/* INLINE SERVICE WORKER */
if ('serviceWorker' in navigator) {
    const swCode = `
        const cacheName = 'qr-vault';
        self.addEventListener('install', e=>{
            e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['./'])));
        });
        self.addEventListener('fetch', e=>{
            e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
        });
    `;
    const blob = new Blob([swCode], { type: 'text/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}

/* INLINE MANIFEST */
const manifest = {
    name: "QR Vault",
    short_name: "QRVault",
    display: "standalone",
    start_url: ".",
    background_color: "#0f172a",
    theme_color: "#22c55e"
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

</body>
</html>
